name: Test Release Builds

on:
  workflow_dispatch:

env:
  CCACHE_DIR: ~/.cache/ccache

jobs:
  build-macos:
    name: Build Release (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Download project external dependencies
        run: just deps

      - name: Download iPlug2 prebuilt Skia libs
        run: |
          cd external/iPlug2/Dependencies
          chmod +x download-prebuilt-libs.sh
          ./download-prebuilt-libs.sh mac

      - name: Build macOS VST3 (Release, unsigned)
        run: |
          xcodebuild \
            -project src/platform/desktop/projects/PolySynth-macOS.xcodeproj \
            -scheme "macOS-VST3" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tail -100

      - name: Build macOS AUv2 (Release, unsigned)
        run: |
          xcodebuild \
            -project src/platform/desktop/projects/PolySynth-macOS.xcodeproj \
            -scheme "macOS-AUv2" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tail -100

  build-windows:
    name: Build Release (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download project external dependencies
        shell: bash
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      - name: Download iPlug2 prebuilt Skia libs
        shell: bash
        run: |
          cd external/iPlug2/Dependencies
          chmod +x download-prebuilt-libs.sh
          ./download-prebuilt-libs.sh win

      - name: Build Windows VST3 (Release|x64)
        run: |
          msbuild src\platform\desktop\projects\PolySynth-vst3.vcxproj -m -p:Configuration=Release -p:Platform=x64 -p:SolutionDir=src\platform\desktop\
