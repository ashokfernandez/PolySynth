name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_DIR: ~/.cache/ccache

# =============================================================================
# SAFETY GATE – all analysis jobs must pass before tests run.
# Job dependency graph:
#
#   lint-static-analysis ──┐
#                          ├──> native-dsp-tests ──────────────────────> build-macos ──┐
#   build-asan-tests ──────┤                                           build-windows ──├──> publish-release
#   build-tsan-tests ──────┤
#                          ├──> native-ui-tests (parallel with dsp) ──┘
#                          ├──> build-wam-demo ──> package-demo-site ──> publish-pages
#                          └──> (pico jobs run independently)
# =============================================================================

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Lint & Static Analysis
  # "Fail fast" gate – catches logic errors before wasting CPU on builds.
  # ---------------------------------------------------------------------------
  lint-static-analysis:
    name: Lint / Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install static analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build cppcheck clang-tidy ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-lint-${{ hashFiles('tests/CMakeLists.txt', 'libs/SEA_DSP/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-lint-

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: external
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download_dependencies.sh') }}

      - name: Download project external dependencies
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      # Configure – generates compile_commands.json which both tools require.
      - name: Configure CMake (generate compile_commands.json)
        run: |
          cmake -S tests -B tests/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPOLYSYNTH_ENABLE_STATIC_ANALYSIS=ON

      # Run cppcheck via the project wrapper script.
      # Output format: file:line: [id] message  (compiler-error style)
      - name: Run Cppcheck
        run: |
          python3 scripts/run_analysis.py \
            --build-dir tests/build \
            --tool cppcheck \
            --verbose

      # Upload the XML report as a CI artifact for PR "Tests" tab display.
      - name: Upload Cppcheck XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: tests/build/cppcheck-report.xml
          if-no-files-found: ignore

      # Run clang-tidy via the same wrapper.
      - name: Run Clang-Tidy
        run: |
          python3 scripts/run_analysis.py \
            --build-dir tests/build \
            --tool clang-tidy \
            --verbose

      # Guard check: BundleResourcePath takes PluginIDType which is void* on
      # Emscripten/WEB, so any call with a const char* must be inside
      # #ifndef WEB_API. This catches the regression without needing Emscripten.
      - name: Check platform API guards (BundleResourcePath)
        run: python3 scripts/check_platform_guards.py

  # ---------------------------------------------------------------------------
  # Job 2: Build & Test with ASan + UBSan
  # Catches memory corruption and undefined behaviour in unit tests.
  # ---------------------------------------------------------------------------
  build-asan-tests:
    name: Build & Test (ASan + UBSan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (Clang for best ASan output)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang llvm ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-asan-${{ hashFiles('tests/CMakeLists.txt', 'libs/SEA_DSP/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-asan-

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: external
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download_dependencies.sh') }}

      - name: Download project external dependencies
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      # Use Clang for ASan – it provides the best symbolised stack traces.
      - name: Configure CMake (ASan + UBSan)
        run: |
          cmake -S tests -B tests/build_asan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUSE_SANITIZER=Address

      - name: Build (ASan)
        run: cmake --build tests/build_asan --parallel $(nproc)

      # halt_on_error=1 ensures the CI job turns red on the first violation.
      # print_stacktrace=1 ensures the report is readable without a debugger.
      - name: Run unit tests (ASan + UBSan)
        env:
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1:print_stacktrace=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
          # llvm-symbolizer must be on PATH for human-readable stack traces.
          # On Ubuntu with clang installed it is available at /usr/bin/llvm-symbolizer.
          ASAN_SYMBOLIZER_PATH: "/usr/bin/llvm-symbolizer"
        run: |
          cd tests/build_asan
          # Exclude two pre-existing timing-sensitive test failures that are
          # unrelated to memory safety. Tracked in issues to be fixed separately.
          ./run_tests "~[VoiceStateMachine]~[VoiceAllocation]"

      - name: Build and run SEA_DSP tests (ASan + UBSan)
        env:
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1:print_stacktrace=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
          ASAN_SYMBOLIZER_PATH: "/usr/bin/llvm-symbolizer"
        run: |
          cmake -S libs/SEA_DSP -B build/sea_dsp_asan \
            -G Ninja \
            -DSEA_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUSE_SANITIZER=Address
          cmake --build build/sea_dsp_asan --parallel $(nproc)
          ./build/sea_dsp_asan/tests/sea_tests

      - name: Show ccache stats
        run: ccache -s

  # ---------------------------------------------------------------------------
  # Job 3: Build & Test with TSan
  # Catches data races in concurrent audio processing.
  # NOTE: Cannot be combined with ASan – uses a separate build directory.
  # ---------------------------------------------------------------------------
  build-tsan-tests:
    name: Build & Test (TSan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang llvm ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-tsan-${{ hashFiles('tests/CMakeLists.txt', 'libs/SEA_DSP/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-tsan-

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: external
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download_dependencies.sh') }}

      - name: Download project external dependencies
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      - name: Configure CMake (TSan)
        run: |
          cmake -S tests -B tests/build_tsan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUSE_SANITIZER=Thread

      - name: Build (TSan)
        run: cmake --build tests/build_tsan --parallel $(nproc)

      - name: Run unit tests (TSan)
        env:
          TSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
          ASAN_SYMBOLIZER_PATH: "/usr/bin/llvm-symbolizer"
        run: |
          cd tests/build_tsan
          ./run_tests "~[VoiceStateMachine]~[VoiceAllocation]"

      - name: Build and run SEA_DSP tests (TSan)
        env:
          TSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
          ASAN_SYMBOLIZER_PATH: "/usr/bin/llvm-symbolizer"
        run: |
          cmake -S libs/SEA_DSP -B build/sea_dsp_tsan \
            -G Ninja \
            -DSEA_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUSE_SANITIZER=Thread
          cmake --build build/sea_dsp_tsan --parallel $(nproc)
          ./build/sea_dsp_tsan/tests/sea_tests

      - name: Show ccache stats
        run: ccache -s

  # ---------------------------------------------------------------------------
  # Job 4: Native DSP Tests (clean build, no sanitizers)
  # Golden-master audio verification and frequency analysis require a clean
  # release-mode binary; sanitizers skew timing and may alter audio output.
  # This job is the gatekeeper for all downstream build jobs.
  # ---------------------------------------------------------------------------
  native-dsp-tests:
    name: Native DSP Tests
    runs-on: ubuntu-latest
    needs: [lint-static-analysis, build-asan-tests, build-tsan-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ github.workflow }}-${{ hashFiles('tests/CMakeLists.txt', 'libs/SEA_DSP/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.workflow }}-

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache

      - name: Reset ccache stats
        run: ccache -z

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: external
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download_dependencies.sh') }}

      - name: Download project external dependencies
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      - name: Configure and build native test binaries
        run: |
          cmake -S tests -B tests/build \
            -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build tests/build --parallel $(nproc)

      - name: Run native unit tests
        run: |
          cd tests/build
          ./run_tests

      - name: Build and run SEA_DSP unit tests
        run: |
          cmake -S libs/SEA_DSP -B build/sea_dsp_tests \
            -G Ninja \
            -DSEA_BUILD_TESTS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build/sea_dsp_tests --parallel $(nproc)
          ./build/sea_dsp_tests/tests/sea_tests

      - name: Verify golden-master audio output
        run: |
          python3 scripts/golden_master.py --verify

      - name: Show ccache stats
        run: ccache -s

      - name: Validate demo output frequency
        run: |
          python3 scripts/analyze_audio.py tests/golden/demo_render_wav.wav --expected-freq 440

  # ---------------------------------------------------------------------------
  # Job 5: Build macOS release artifacts on tag pushes.
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build Release (macOS)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    needs: [native-dsp-tests, native-ui-tests]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Download project external dependencies
        run: just deps

      - name: Download iPlug2 prebuilt Skia libs
        run: |
          cd external/iPlug2/Dependencies
          chmod +x download-prebuilt-libs.sh
          ./download-prebuilt-libs.sh mac

      - name: Build unsigned macOS release bundles
        run: just plugin-release-mac

      - name: Create macOS installer package
        run: just plugin-package-mac

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: polysynth-release-macos
          path: .artifacts/releases/macos/PolySynth-*-macOS.pkg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 6: Build Windows release artifacts on tag pushes.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Release (Windows)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: [native-dsp-tests, native-ui-tests]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download project external dependencies
        shell: bash
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      - name: Download iPlug2 prebuilt Skia libs
        shell: bash
        run: |
          cd external/iPlug2/Dependencies
          chmod +x download-prebuilt-libs.sh
          ./download-prebuilt-libs.sh win

      - name: Build Windows VST3 (Release|x64)
        run: |
          msbuild src\platform\desktop\projects\PolySynth-vst3.vcxproj -m -p:Configuration=Release -p:Platform=x64 "-p:SolutionDir=${{ github.workspace }}\src\platform\desktop\"

      - name: Package Windows VST3 zip
        shell: bash
        run: |
          BUNDLE="src/platform/desktop/build-win/PolySynth.vst3"
          OUT_DIR=".artifacts/releases/windows"
          ZIP_PATH="${OUT_DIR}/PolySynth-windows-vst3.zip"
          if [ ! -d "$BUNDLE" ]; then
            echo "Failed to locate built bundle at $BUNDLE" >&2
            exit 1
          fi
          mkdir -p "$OUT_DIR"
          rm -rf "${OUT_DIR}/PolySynth.vst3" "$ZIP_PATH"
          cp -R "$BUNDLE" "$OUT_DIR/"
          python3 -c "
          import os, sys, zipfile
          bundle, zip_path = sys.argv[1], sys.argv[2]
          root_name = os.path.basename(bundle.rstrip('/\\\\'))
          with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as a:
              for base, _, files in os.walk(bundle):
                  for f in files:
                      fp = os.path.join(base, f)
                      a.write(fp, os.path.join(root_name, os.path.relpath(fp, bundle)))
          " "$OUT_DIR/PolySynth.vst3" "$ZIP_PATH"

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: polysynth-release-windows
          path: .artifacts/releases/windows/PolySynth-windows-vst3.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 7: Publish GitHub release from tag artifacts.
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    permissions:
      contents: write

    steps:
      - name: Download macOS release artifact
        uses: actions/download-artifact@v4
        with:
          name: polysynth-release-macos
          path: release-assets/macos

      - name: Download Windows release artifact
        uses: actions/download-artifact@v4
        with:
          name: polysynth-release-windows
          path: release-assets/windows

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: PolySynth ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/macos/PolySynth-*-macOS.pkg
            release-assets/windows/PolySynth-windows-vst3.zip

  # ---------------------------------------------------------------------------
  # Pico Layer 1: Native Host Tests with Embedded Configuration
  # Runs DSP unit tests with POLYSYNTH_USE_FLOAT, MAX_VOICES=4, effects OFF.
  # Catches float precision, voice-count, and deploy-flag regressions.
  # ---------------------------------------------------------------------------
  pico-native-embedded-tests:
    name: Pico / Layer 1 – Native Embedded Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: external
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download_dependencies.sh') }}

      - name: Download project external dependencies
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      - name: Configure and build embedded targets
        run: |
          cmake -S tests -B tests/build_embedded \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug
          cmake --build tests/build_embedded --parallel

      - name: Run embedded-config unit tests
        run: tests/build_embedded/run_tests_embedded -r compact

      - name: Verify embedded golden-master audio output
        run: |
          python3 scripts/golden_master.py --verify --embedded \
            --build-dir tests/build_embedded

  # ---------------------------------------------------------------------------
  # Pico Layer 1b: ARM Golden Masters (QEMU User-Mode)
  # Cross-compiles embedded demos with arm-linux-gnueabihf-g++ and runs under
  # QEMU to verify ARM 32-bit single-precision float arithmetic produces the
  # expected audio output. Catches ARM-specific float behavior differences
  # (FMA fusion, rounding) that x86 native tests cannot detect.
  # ---------------------------------------------------------------------------
  pico-arm-golden-masters:
    name: Pico / Layer 1b – ARM Golden Masters (QEMU)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build qemu-user-static \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: external
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download_dependencies.sh') }}

      - name: Download project external dependencies
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      - name: Cross-compile embedded targets for ARM
        run: |
          cmake -S tests -B tests/build_arm \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-linux-gnueabihf.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          cmake --build tests/build_arm --parallel $(nproc)

      - name: Run ARM embedded unit tests under QEMU
        run: |
          qemu-arm -L /usr/arm-linux-gnueabihf/ \
            tests/build_arm/run_tests_embedded -r compact

      - name: Verify ARM golden-master audio output
        env:
          QEMU_LD_PREFIX: /usr/arm-linux-gnueabihf
        run: |
          python3 scripts/golden_master.py --verify --arm

  # ---------------------------------------------------------------------------
  # Pico Layer 2a: ARM Cross-Compile Check (RP2350)
  # Proves firmware compiles for the actual target hardware.
  # ---------------------------------------------------------------------------
  pico-arm-compile-check:
    name: Pico / Layer 2a – ARM Compile (RP2350)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Cache Pico SDK
        uses: actions/cache@v4
        with:
          path: external/pico-sdk
          key: pico-sdk-${{ hashFiles('scripts/download_pico_sdk.sh') }}

      - name: Download Pico SDK
        run: |
          chmod +x scripts/download_pico_sdk.sh
          ./scripts/download_pico_sdk.sh

      - name: Build Pico firmware (RP2350)
        run: |
          cmake -S src/platform/pico -B build/pico \
            -DPICO_SDK_PATH=${{ github.workspace }}/external/pico-sdk \
            -G Ninja
          cmake --build build/pico

      - name: Verify .uf2 output
        run: |
          test -f build/pico/polysynth_pico.uf2
          echo "polysynth_pico.uf2 generated successfully"
          ls -lh build/pico/polysynth_pico.uf2

      - name: Check binary size
        run: arm-none-eabi-size build/pico/polysynth_pico.elf

  # ---------------------------------------------------------------------------
  # Pico Layer 2b: Wokwi Emulated Firmware Test (RP2040 proxy)
  # Runs actual firmware in Wokwi simulator, checks serial output.
  # Only runs when WOKWI_CLI_TOKEN is configured (optional for forks).
  # ---------------------------------------------------------------------------
  pico-emulation-test:
    name: Pico / Layer 2b – Wokwi Emulation
    runs-on: ubuntu-latest
    needs: pico-arm-compile-check
    if: ${{ vars.WOKWI_ENABLED == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Cache Pico SDK
        uses: actions/cache@v4
        with:
          path: external/pico-sdk
          key: pico-sdk-${{ hashFiles('scripts/download_pico_sdk.sh') }}

      - name: Download Pico SDK
        run: |
          chmod +x scripts/download_pico_sdk.sh
          ./scripts/download_pico_sdk.sh

      - name: Build Pico firmware for emulation (RP2040 proxy)
        run: |
          cmake -S src/platform/pico -B build/pico-emu \
            -DPICO_SDK_PATH=${{ github.workspace }}/external/pico-sdk \
            -DPICO_BOARD=pico_w \
            -G Ninja
          cmake --build build/pico-emu

      - name: Run firmware in Wokwi emulator
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: src/platform/pico/wokwi
          timeout: 30000
          expect_text: "[TEST:ALL_PASSED]"
          fail_text: "[TEST:FAIL],[GOLDEN:FAIL]"
          serial_log_file: wokwi-serial.log

      - name: Verify golden master CRC from serial output
        if: always()
        run: |
          if [ -f wokwi-serial.log ]; then
            if grep -q '\[GOLDEN:CRC32:' wokwi-serial.log; then
              echo "Golden master CRC found in serial output:"
              grep '\[GOLDEN:' wokwi-serial.log
              if grep -q '\[GOLDEN:FAIL\]' wokwi-serial.log; then
                echo "ERROR: Golden master CRC mismatch!"
                exit 1
              fi
            else
              echo "INFO: No golden master CRC in serial output (may be placeholder)"
            fi
          fi

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-serial-log
          path: wokwi-serial.log
          if-no-files-found: ignore

      - name: Upload logic analyzer trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-logic-trace
          path: src/platform/pico/wokwi/wokwi-logic.vcd
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Job 8: Build PolySynth WAM Demo (depends on safety gates, not DSP tests)
  # ---------------------------------------------------------------------------
  build-wam-demo:
    name: Build PolySynth WAM Demo
    runs-on: ubuntu-latest
    needs: [lint-static-analysis, build-asan-tests, build-tsan-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Install WAM build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make python3

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: external
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download_dependencies.sh') }}

      - name: Download project external dependencies
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      - name: Ensure iPlug2 web build prerequisites
        run: |
          chmod +x scripts/download_iPlug2.sh
          ./scripts/download_iPlug2.sh

      - name: Build PolySynth WAM web demo
        working-directory: src/platform/desktop
        run: |
          chmod +x scripts/makedist-web.sh
          ./scripts/makedist-web.sh off

      - name: Verify generated web demo bundle
        run: test -f src/platform/desktop/build-web/index.html

      - name: Upload web demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: polysynth-web-demo
          path: src/platform/desktop/build-web
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 9 (NEW): Native UI Visual Regression Tests
  # Ensures no visual regressions before platform builds.
  # Runs on macOS because the iPlug2 APP target requires Cocoa/SWELL.
  # ---------------------------------------------------------------------------
  native-ui-tests:
    name: Native UI Tests
    runs-on: macos-14
    needs: [lint-static-analysis, build-asan-tests, build-tsan-tests]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: brew install cmake ninja ccache python3

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-sandbox-${{ hashFiles('ComponentGallery/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-sandbox-

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: external
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download_dependencies.sh') }}

      - name: Download project external dependencies
        run: |
          chmod +x scripts/download_dependencies.sh
          ./scripts/download_dependencies.sh

      - name: Download iPlug2 prebuilt Skia libs
        run: |
          cd external/iPlug2/Dependencies
          chmod +x download-prebuilt-libs.sh
          ./download-prebuilt-libs.sh mac

      - name: Install Python VRT dependencies
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/pip install -r scripts/requirements-vrt.txt

      # Always generate baselines on the runner for consistency.
      # PRs: use the PR base SHA. Pushes: use the previous commit (HEAD~1).
      - name: Checkout base commit for baseline generation
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git checkout ${{ github.event.pull_request.base.sha }}
          else
            git checkout HEAD~1
          fi

      - name: Build PolySynthGallery (base)
        run: |
          cmake -S ComponentGallery -B ComponentGallery/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build ComponentGallery/build --parallel $(nproc)

      - name: Generate VRT baselines from base commit
        run: bash scripts/tasks/run_vrt.sh --generate

      - name: Checkout current commit
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git checkout ${{ github.event.pull_request.head.sha }}
          else
            git checkout ${{ github.sha }}
          fi

      - name: Build PolySynthGallery sandbox
        run: |
          cmake -S ComponentGallery -B ComponentGallery/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build ComponentGallery/build --parallel $(nproc)

      - name: Run VRT
        run: bash scripts/tasks/run_vrt.sh --verify

      - name: Build PolySynth desktop app
        run: bash scripts/tasks/build_desktop.sh Release

      - name: Smoke test desktop app startup
        run: bash scripts/tasks/test_desktop_startup.sh Release

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diff-reports
          path: tests/Visual/output/
          if-no-files-found: ignore

      - name: Show ccache stats
        if: always()
        run: ccache -s

  # ---------------------------------------------------------------------------
  # Job 10: Package demo site
  # ---------------------------------------------------------------------------
  package-demo-site:
    name: Package Pages Site
    runs-on: ubuntu-latest
    needs: [build-wam-demo]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download web demo artifact
        uses: actions/download-artifact@v4
        with:
          name: polysynth-web-demo
          path: docs/web-demo

      - name: Generate release download metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/tasks/generate_downloads_json.py \
            --repo "${GITHUB_REPOSITORY}" \
            --output docs/downloads.json

      - name: Validate docs HTML
        run: |
          test -f docs/index.html \
            || (echo "ERROR: docs/index.html missing" && exit 1)
          grep -q "web-demo/scripts/audioworklet.js" docs/index.html \
            || (echo "ERROR: Missing audioworklet.js reference in index.html" && exit 1)
          grep -q "web-demo/scripts/PolySynth-web.js" docs/index.html \
            || (echo "ERROR: Missing PolySynth-web.js reference in index.html" && exit 1)
          test -f docs/web-demo/scripts/PolySynth-web.wasm \
            || (echo "ERROR: WASM artifact missing from docs/web-demo/scripts/" && exit 1)
          test -f docs/design-system.css \
            || (echo "ERROR: design-system.css missing" && exit 1)
          for f in docs/audio/*.wav; do
            name=$(basename "$f")
            grep -q "$name" docs/index.html \
              || echo "WARN: $name not referenced in index.html"
          done
          echo "Docs validation passed"

      - name: Finalize docs for Pages
        run: |
          touch docs/.nojekyll

      - name: Upload Pages deployment artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # ---------------------------------------------------------------------------
  # Job 11: Publish GitHub Pages (unchanged)
  # ---------------------------------------------------------------------------
  publish-pages:
    name: Publish GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: package-demo-site
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
